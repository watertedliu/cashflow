// 上個月的民國年月字串，例如 "115/3"
function _lastMonthKey() {
    var now = new Date();
    var y = now.getFullYear();
    var lastMonthIdx = now.getMonth() - 1; // 0-11；-1 代表去年 12 月
    if (lastMonthIdx < 0) { lastMonthIdx = 11; y -= 1; }
    return (y - 1911) + '/' + (lastMonthIdx + 1);
}

// 把 "115/3" 轉成排序 key（字串比較時 "115/3" < "115/12"，所以要 pad）
function _monthSortKey(mk) {
    var parts = String(mk || '').split('/');
    if (parts.length !== 2) return '0000/00';
    var y = parts[0];
    var m = parts[1];
    if (m.length < 2) m = '0' + m;
    return y + '/' + m;
}

function _sortedMonthly() {
    var list = (DATA.monthly || []).slice();
    list.sort(function(a, b) {
        var ka = _monthSortKey(a.month);
        var kb = _monthSortKey(b.month);
        return ka < kb ? -1 : ka > kb ? 1 : 0;
    });
    return list;
}

var _trendChart = null;
var _trendRange = 12; // 近 N 個月；0 = 全部；-1 = 自訂
var _trendCustom = { start: null, end: null }; // 自訂範圍，民國年月字串
var _trendShow = { income: true, expense: true, balance: true };
var _trendYearOpen = {}; // 歷史表格年份展開狀態 { '115': true, '114': false }

function renderTrend() {
    var container = document.getElementById('tab-trend');
    if (!container) return;

    var all = _sortedMonthly();

    var html = '';

    // 頂端操作列
    html += '<div class="toolbar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
    html += '<button class="btn-refresh" style="background:var(--lux-navy)" onclick="addMonthly()">＋ 新增</button>';
    html += '<span style="flex:1"></span>';
    html += '<span style="font-size:13px;color:var(--muted)">範圍：</span>';
    var customLabel = '自訂';
    if (_trendRange === -1 && _trendCustom.start && _trendCustom.end) {
        customLabel = _trendCustom.start + ' ~ ' + _trendCustom.end;
    }
    [[12,'近 12 個月'],[24,'近 24 個月'],[0,'全部'],[-1, customLabel]].forEach(function(r) {
        var active = _trendRange === r[0];
        var onclick = r[0] === -1 ? 'onclick="openTrendCustomRange()"' : 'onclick="setTrendRange(' + r[0] + ')"';
        html += '<button ' + onclick + ' style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:' + (active?'var(--lux-navy)':'var(--card)') + ';color:' + (active?'white':'var(--text)') + ';font-size:13px;cursor:pointer;font-family:inherit">' + esc(r[1]) + '</button>';
    });
    html += '</div>';

    if (all.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增任何月記錄。<br>點上方「＋ 新增上個月」開始記錄。</div>';
        container.innerHTML = html;
        return;
    }

    // 折線圖 + 顯示切換
    html += '<div style="background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)">';
    html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">';
    [
        ['income',  '收入', '#16A34A'],
        ['expense', '支出', '#DC2626'],
        ['balance', '結餘', '#0284C7']
    ].forEach(function(s) {
        var on = _trendShow[s[0]];
        html += '<button onclick="toggleTrendLine(\'' + s[0] + '\')" style="padding:6px 14px;border:2px solid ' + s[2] + ';border-radius:6px;background:' + (on ? s[2] : 'var(--card)') + ';color:' + (on ? 'white' : s[2]) + ';font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">' + s[1] + '</button>';
    });
    html += '</div>';
    html += '<canvas id="trend-chart" style="max-height:180px"></canvas>';
    html += '</div>';

    // 歷史表格：按年分組、可收合
    // 先按年分組
    var byYear = {};
    all.forEach(function(r) {
        var y = String(r.month).split('/')[0];
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(r);
    });
    var years = Object.keys(byYear).sort(); // 字串排序，113 < 114 < 115
    var latestYear = years[years.length - 1];

    // 初始化展開狀態：預設只開最新年份
    years.forEach(function(y) {
        if (_trendYearOpen[y] === undefined) {
            _trendYearOpen[y] = (y === latestYear);
        }
    });

    // 年份倒序顯示（最新在上）
    var yearsDesc = years.slice().reverse();
    yearsDesc.forEach(function(y) {
        var rows = byYear[y];
        var yIncome = 0, yExpense = 0;
        rows.forEach(function(r) { yIncome += (r.income || 0); yExpense += (r.expense || 0); });
        var yBalance = yIncome - yExpense;
        var yBalColor = yBalance >= 0 ? 'var(--green)' : 'var(--red)';
        var open = _trendYearOpen[y];
        var arrow = open ? '▼' : '▶';

        html += '<div style="background:var(--card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden">';
        // 年份標題列
        html += '<div onclick="toggleTrendYear(\'' + y + '\')" style="cursor:pointer;user-select:none;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:' + (open ? '#F1EDE8' : 'var(--card)') + ';border-bottom:' + (open ? '1px solid var(--border)' : 'none') + '">';
        html += '<span style="font-size:15px;font-weight:700">' + arrow + ' ' + y + ' 年</span>';
        html += '<span style="font-size:12px;color:var(--muted)">' + rows.length + ' 筆</span>';
        html += '<span style="flex:1"></span>';
        html += '<span style="font-size:13px"><span style="color:var(--muted)">收入 </span><b style="color:var(--green)">' + fmt(yIncome) + '</b></span>';
        html += '<span style="font-size:13px"><span style="color:var(--muted)">支出 </span><b style="color:var(--red)">' + fmt(yExpense) + '</b></span>';
        html += '<span style="font-size:13px"><span style="color:var(--muted)">結餘 </span><b style="color:' + yBalColor + '">' + (yBalance >= 0 ? '+' : '') + fmt(yBalance) + '</b></span>';
        html += '</div>';

        // 月份明細表
        if (open) {
            html += '<div class="table-wrap"><table class="stock-table" style="margin:0"><thead><tr>';
            html += '<th>月份</th><th>收入</th><th>支出</th><th>結餘</th><th>備註</th><th></th>';
            html += '</tr></thead><tbody>';
            var rowsDesc = rows.slice().reverse();
            rowsDesc.forEach(function(r) {
                var balance = (r.income || 0) - (r.expense || 0);
                var balColor = balance >= 0 ? 'var(--green)' : 'var(--red)';
                html += '<tr>';
                html += '<td style="cursor:pointer;font-weight:600" onclick="editMonthly(\'' + esc(r.month) + '\')">' + esc(r.month) + '</td>';
                html += '<td style="color:var(--green);font-weight:600">' + fmt(r.income || 0) + '</td>';
                html += '<td style="color:var(--red);font-weight:600">' + fmt(r.expense || 0) + '</td>';
                html += '<td style="font-weight:700;color:' + balColor + '">' + (balance >= 0 ? '+' : '') + fmt(balance) + '</td>';
                html += '<td style="font-size:12px;color:var(--muted)">' + esc(r.note || '') + '</td>';
                html += '<td><button class="btn-del" title="刪除" onclick="deleteMonthly(\'' + esc(r.month) + '\')"><i class="ti ti-x" style="font-size:14px"></i></button></td>';
                html += '</tr>';
            });
            html += '</tbody></table></div>';
        }
        html += '</div>';
    });

    container.innerHTML = html;

    // 畫圖（要等 canvas 進 DOM 後）
    _drawTrendChart(all);
}

function setTrendRange(n) {
    _trendRange = n;
    renderTrend();
}

function openTrendCustomRange() {
    var all = _sortedMonthly();
    if (all.length === 0) { toast('目前沒有任何月記錄', true); return; }
    var defaultStart = _trendCustom.start || all[0].month;
    var defaultEnd = _trendCustom.end || all[all.length-1].month;
    var options = all.map(function(r) {
        return '<option value="' + esc(r.month) + '">' + esc(r.month) + '</option>';
    }).join('');
    var ov = document.createElement('div');
    ov.className = 'overlay';
    var html = '<div class="modal"><h3>自訂範圍</h3>';
    html += '<label style="font-size:12px;color:var(--muted)">起始月份</label>';
    html += '<select id="tc-start">' + options + '</select>';
    html += '<label style="font-size:12px;color:var(--muted)">結束月份</label>';
    html += '<select id="tc-end">' + options + '</select>';
    html += '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +
            '<button class="btn-primary" id="tc-save">套用</button></div></div>';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    document.getElementById('tc-start').value = defaultStart;
    document.getElementById('tc-end').value = defaultEnd;
    document.getElementById('tc-save').onclick = function() {
        var s = document.getElementById('tc-start').value;
        var e = document.getElementById('tc-end').value;
        if (_monthSortKey(s) > _monthSortKey(e)) { toast('起始不可晚於結束', true); return; }
        _trendCustom.start = s;
        _trendCustom.end = e;
        _trendRange = -1;
        ov.remove();
        renderTrend();
    };
}

function toggleOverview(section) {
    _overviewOpen[section] = !_overviewOpen[section];
    render();
}

function toggleTrendYear(y) {
    _trendYearOpen[y] = !_trendYearOpen[y];
    renderTrend();
}

function toggleTrendLine(key) {
    _trendShow[key] = !_trendShow[key];
    // 至少要留一條，避免空圖
    if (!_trendShow.income && !_trendShow.expense && !_trendShow.balance) {
        _trendShow[key] = true;
        return;
    }
    renderTrend();
}

function _drawTrendChart(all) {
    var canvas = document.getElementById('trend-chart');
    if (!canvas || typeof Chart === 'undefined') return;

    // 根據 _trendRange 切片
    var data;
    if (_trendRange > 0) {
        data = all.slice(-_trendRange);
    } else if (_trendRange === -1 && _trendCustom.start && _trendCustom.end) {
        var s = _monthSortKey(_trendCustom.start);
        var e = _monthSortKey(_trendCustom.end);
        data = all.filter(function(r) {
            var k = _monthSortKey(r.month);
            return k >= s && k <= e;
        });
    } else {
        data = all;
    }

    var labels = data.map(function(r){ return r.month; });
    var incomes = data.map(function(r){ return r.income || 0; });
    var expenses = data.map(function(r){ return r.expense || 0; });
    var balances = data.map(function(r){ return (r.income || 0) - (r.expense || 0); });

    // 銷毀舊圖
    if (_trendChart) { _trendChart.destroy(); _trendChart = null; }

    _trendChart = new Chart(canvas, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '收入',
                    data: incomes,
                    borderColor: '#16A34A',
                    backgroundColor: 'rgba(22,163,74,0.08)',
                    tension: 0.25,
                    fill: false,
                    hidden: !_trendShow.income
                },
                {
                    label: '支出',
                    data: expenses,
                    borderColor: '#DC2626',
                    backgroundColor: 'rgba(220,38,38,0.08)',
                    tension: 0.25,
                    fill: false,
                    hidden: !_trendShow.expense
                },
                {
                    label: '結餘',
                    data: balances,
                    borderColor: '#0284C7',
                    backgroundColor: 'rgba(2,132,199,0.08)',
                    tension: 0.25,
                    fill: false,
                    borderDash: [6, 4],
                    hidden: !_trendShow.balance
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top' },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            return ctx.dataset.label + '：' + (v >= 0 ? '' : '') + v.toLocaleString();
                        }
                    }
                }
            },
            scales: {
                y: {
                    ticks: {
                        callback: function(v) { return v.toLocaleString(); }
                    }
                }
            }
        }
    });
}

// 新增或編輯的共用表單
// forceCustom: true 時預設不帶「上個月」而讓使用者填
function _monthlyForm(existing, forceCustom) {
    var ov = document.createElement('div');
    ov.className = 'overlay';
    var defaultMonth = existing ? existing.month : (forceCustom ? '' : _lastMonthKey());
    var title = existing ? '編輯月記錄' : '新增月記錄';
    var html = '<div class="modal"><h3>' + title + '</h3>';
    html += '<label style="font-size:12px;color:var(--muted)">月份（民國年/月，例如 115/3）</label>';
    html += '<input type="text" id="mo-month" placeholder="115/3" value="' + esc(defaultMonth) + '"' + (existing ? ' readonly style="background:#f5f5f5"' : '') + '>';
    html += '<label style="font-size:12px;color:var(--muted)">當月收入</label>';
    html += '<input type="number" id="mo-income" placeholder="0" step="1" value="' + (existing ? existing.income : '') + '">';
    html += '<label style="font-size:12px;color:var(--muted)">當月支出</label>';
    html += '<input type="number" id="mo-expense" placeholder="0" step="1" value="' + (existing ? existing.expense : '') + '">';
    html += '<label style="font-size:12px;color:var(--muted)">備註（選填）</label>';
    html += '<input type="text" id="mo-note" placeholder="" value="' + esc(existing ? (existing.note || '') : '') + '">';
    html += '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +
            '<button class="btn-primary" id="mo-save">' + (existing ? '儲存' : '新增') + '</button></div></div>';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    document.getElementById('mo-save').onclick = function() {
        var month = document.getElementById('mo-month').value.trim();
        var income = parseInt(document.getElementById('mo-income').value) || 0;
        var expense = parseInt(document.getElementById('mo-expense').value) || 0;
        var note = document.getElementById('mo-note').value.trim();
        if (!/^\d{2,3}\/([1-9]|1[0-2])$/.test(month)) { toast('月份格式錯誤（例：115/3）', true); return; }
        if (income < 0 || expense < 0) { toast('金額不可為負', true); return; }
        if (!DATA.monthly) DATA.monthly = [];
        // 新增時檢查重複
        if (!existing) {
            var dup = DATA.monthly.find(function(r){ return r.month === month; });
            if (dup) { toast('該月份已存在，請改為編輯', true); return; }
            DATA.monthly.push({ month: month, income: income, expense: expense, note: note });
        } else {
            existing.income = income;
            existing.expense = expense;
            existing.note = note;
        }
        saveData();
        ov.remove();
        renderTrend();
        toast(existing ? '已更新 ' + month : '已新增 ' + month);
    };
}

function addMonthly(forceCustom) { _monthlyForm(null, forceCustom === true); }

function editMonthly(month) {
    var r = (DATA.monthly || []).find(function(x){ return x.month === month; });
    if (!r) return;
    _monthlyForm(r, false);
}

function deleteMonthly(month) {
    showConfirm('確定刪除 ' + month + ' 的月記錄？', function() {
        DATA.monthly = (DATA.monthly || []).filter(function(x){ return x.month !== month; });
        saveData();
        renderTrend();
        toast('已刪除 ' + month);
    });
}

function renderStock() {
    var container = document.getElementById('tab-stock');
    if (!container) return;

    var html = '';

    // 除權息提醒
    html += renderDividendAlerts();

    // 子頁籤
    html += '<div class="stock-sub-tabs">';
    html += '<button class="stock-sub-tab' + (stockSubTab==='holdings'?' active':'') + '" onclick="stockSubTab=\'holdings\';renderStock()">持股總覽</button>';
    html += '<button class="stock-sub-tab' + (stockSubTab==='dividend'?' active':'') + '" onclick="stockSubTab=\'dividend\';renderStock()">股利紀錄</button>';
    html += '<button class="stock-sub-tab' + (stockSubTab==='pledge'?' active':'') + '" onclick="stockSubTab=\'pledge\';renderStock()">質押紀錄</button>';
    html += '</div>';

    if (stockSubTab === 'holdings') {
        html += renderStockHoldings();
    } else if (stockSubTab === 'dividend') {
        html += renderStockDividend();
    } else if (stockSubTab === 'pledge') {
        html += renderStockPledge();
    }

    container.innerHTML = html;
}

function renderStockHoldings() {
    var html = '';

    // 更新按鈕列
    html += '<div class="stock-refresh-bar">';
    html += '<button class="btn-refresh" id="btn-fetch-price" onclick="refreshPrices()"><i class="ti ti-antenna-bars-5"></i> 更新股價</button>';
    html += '<button class="btn-refresh" style="background:var(--lux-navy)" onclick="addHolding()">＋ 新增持股</button>';
    html += '<button class="btn-refresh" style="background:rgba(255,255,255,.1);border:1px solid var(--border)" onclick="toggleStockColumn()"><i class="ti ti-columns"></i> 欄位</button>';
    if (stockData.lastUpdate) {
        html += '<span class="last-update">最後更新：' + esc(stockData.lastUpdate) + '</span>';
    }
    html += '<span class="last-update" style="color:var(--yellow)">※ 顯示前一交易日收盤價</span>';
    html += '</div>';

    // 計算總覽
    var totalCost = 0, totalMarket = 0, todayPL = 0;
    stockData.holdings.forEach(function(h) {
        var cost = h.shares * h.cost;
        var p = stockData.prices[h.id];
        var market = p ? h.shares * p.price : cost;
        totalCost += cost;
        totalMarket += market;
        if (p && p.change) todayPL += h.shares * p.change;
    });
    var totalPL = totalMarket - totalCost;
    var totalRate = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;

    // 今年度股利
    var thisYear = new Date().getFullYear();
    var yearDividend = 0;
    stockData.dividends.forEach(function(d) {
        if (d.date && d.date.substring(0,4) === String(thisYear)) {
            yearDividend += (d.cash || 0);
        }
    });

    // 摘要列
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px 20px;font-size:14px;margin-bottom:10px;padding:8px 12px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)">';
    html += '<span style="color:var(--muted)">成本 <b style="color:var(--text)">' + fmt(totalCost) + '</b></span>';
    html += '<span style="color:var(--muted)">市值 <b style="color:var(--lux-gold)">' + fmt(totalMarket) + '</b></span>';
    html += '<span style="color:var(--muted)">損益 <b class="' + (totalPL>=0?'pos':'neg') + '">' + (totalPL>=0?'+':'') + fmt(totalPL) + ' (' + fmtRate(totalRate) + ')</b></span>';
    html += '<span style="color:var(--muted)">今日損益 <b class="' + (todayPL>=0?'pos':'neg') + '">' + (todayPL>=0?'+':'') + fmt(todayPL) + '</b></span>';
    html += '<span style="color:var(--muted)">今年股利 <b style="color:var(--lux-navy)">' + fmt(yearDividend) + '</b></span>';
    html += '</div>';

    // 持股明細表
    if (stockData.holdings.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增持股，請點擊「＋ 新增持股」開始</div>';
        return html;
    }

    var vis = getStockColVisible();
    html += '<div class="table-wrap"><table class="stock-table"><thead><tr>';
    html += '<th>股票</th>';
    if (vis.shares) html += '<th>股數</th>';
    if (vis.cost) html += '<th>買入均價</th>';
    if (vis.price) html += '<th>現價</th>';
    if (vis.totalCost) html += '<th>投入成本</th>';
    if (vis.market) html += '<th>現值</th>';
    if (vis.pl) html += '<th>損益</th>';
    if (vis.rate) html += '<th>報酬率</th>';
    if (vis.dayPL) html += '<th>今日損益</th>';
    if (vis.weight) html += '<th>佔比</th>';
    html += '<th></th>';
    html += '</tr></thead><tbody>';

    stockData.holdings.forEach(function(h, idx) {
        var p = stockData.prices[h.id];
        var curPrice = p ? p.price : null;
        var cost = h.shares * h.cost;
        var market = curPrice ? h.shares * curPrice : null;
        var pl = market !== null ? market - cost : null;
        var rate = (pl !== null && cost > 0) ? (pl / cost) * 100 : null;
        var weight = totalMarket > 0 && market !== null ? (market / totalMarket) * 100 : null;

        html += '<tr>';
        html += '<td class="stock-name-cell" style="cursor:pointer" onclick="editHolding(' + idx + ')">' + esc(h.id) + '<br><span style="font-size:12px;color:var(--muted);font-weight:400">' + esc(h.name) + '</span></td>';
        if (vis.shares) {
            var pledgedShares = 0;
            if (stockData.pledges) stockData.pledges.forEach(function(p){ if (p.stockId === h.id) pledgedShares += p.shares; });
            html += '<td>' + fmt(h.shares) + (pledgedShares > 0 ? '<br><span style="font-size:11px;color:var(--muted)">質押 ' + fmt(pledgedShares) + '</span>' : '') + '</td>';
        }
        if (vis.cost) html += '<td>' + h.cost.toFixed(2) + '</td>';
        if (vis.price) html += '<td>' + (curPrice ? curPrice.toFixed(2) : '<span style="color:var(--muted)">-</span>') + '</td>';
        if (vis.totalCost) html += '<td>' + fmt(cost) + '</td>';
        if (vis.market) html += '<td style="font-weight:600">' + (market !== null ? fmt(market) : '-') + '</td>';
        if (vis.pl) html += '<td class="' + (pl !== null ? (pl>=0?'pos':'neg') : '') + '" style="font-weight:600">' + (pl !== null ? (pl>=0?'+':'') + fmt(pl) : '-') + '</td>';
        if (vis.rate) html += '<td class="rate-cell ' + rateClass(rate) + '">' + (rate !== null ? fmtRate(rate) : '-') + '</td>';
        if (vis.dayPL) {
            var dayPL = (p && p.change) ? h.shares * p.change : null;
            html += '<td class="' + (dayPL !== null ? (dayPL>=0?'pos':'neg') : '') + '" style="font-weight:600">' + (dayPL !== null ? (dayPL>=0?'+':'') + fmt(dayPL) : '-') + '</td>';
        }
        if (vis.weight) html += '<td>' + (weight !== null ? weight.toFixed(1) + '%' : '-') + '</td>';
        html += '<td><button class="btn-del" onclick="deleteHolding(' + idx + ')"><i class="ti ti-x" style="font-size:14px"></i></button></td>';
        html += '</tr>';
    });

    html += '</tbody></table></div>';

    return html;
}

function toggleDivYear(year) {
    if (!window._divExpanded) window._divExpanded = {};
    var currentYear = String(new Date().getFullYear());
    // 今年預設 true，點擊後變 false；其他年份預設 false，點擊變 true
    if (year === currentYear) {
        window._divExpanded[year] = !(window._divExpanded[year] !== false);
    } else {
        window._divExpanded[year] = !(window._divExpanded[year] === true);
    }
    renderStock();
}

function renderStockDividend() {
    var html = '';

    // 累積股利統計方塊（特定股票）
    var trackedStocks = [
        { id: '00400A', label: '00400A' },
        { id: '00937B', label: '00937B' },
        { id: '00981A', label: '00981A' },
        { id: '2812',   label: '台中銀' }
    ];

    trackedStocks.forEach(function(s){ totals[s.id] = 0; });

        if (totals.hasOwnProperty(d.stockId)) {
            totals[d.stockId] += (d.cash || 0);
        }
    });

    html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
    html += '<button class="btn-refresh" style="background:var(--lux-navy)" onclick="addDividend()">＋ 新增股利</button>';

        html += '<div style="padding:8px 14px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);font-size:13px">';

        html += '<div style="font-weight:700;color:var(--lux-navy);font-size:15px">$' + fmt(totals[s.id]) + '</div>';
        html += '</div>';
    });
    html += '</div>';

    if (stockData.dividends.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增股利紀錄</div>';
        return html;
    }

    // 按年份分組
    var byYear = {};
    stockData.dividends.forEach(function(d, idx) {
        var y = d.date ? d.date.substring(0,4) : '未知';
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push({ d: d, idx: idx });
    });

    var years = Object.keys(byYear).sort().reverse();
    var currentYear = String(new Date().getFullYear());
    if (!window._divExpanded) window._divExpanded = {};

    years.forEach(function(y) {
        var items = byYear[y];
        var yearTotal = 0;
        items.forEach(function(item) { yearTotal += (item.d.cash || 0); });
        // 今年預設展開，其他年份依記憶狀態（預設收合）
        var expanded = (y === currentYear) ? (window._divExpanded[y] !== false) : (window._divExpanded[y] === true);
        var arrow = expanded ? '▼' : '▶';

        html += '<div class="dividend-section">';
        html += '<h3 style="cursor:pointer;user-select:none" onclick="toggleDivYear(\'' + esc(y) + '\')">' + arrow + ' ' + y + ' 年<span class="dividend-year-total">合計 $' + fmt(yearTotal) + '</span></h3>';
        if (expanded) {
            html += '<div class="table-wrap"><table class="stock-table"><thead><tr>';
            html += '<th>日期</th><th>股票</th><th>現金股利</th><th>股票股利</th><th></th>';
            html += '</tr></thead><tbody>';

            items.forEach(function(item) {
                var d = item.d;
                html += '<tr>';
                html += '<td style="text-align:left">' + esc(d.date) + '</td>';
                html += '<td style="text-align:left">' + esc(d.stockId + ' ' + d.stockName) + '</td>';
                html += '<td style="color:var(--green);font-weight:600">' + (d.cash > 0 ? '$' + fmt(d.cash) : '-') + '</td>';
                html += '<td>' + (d.stockShares > 0 ? d.stockShares + ' 股' : '-') + '</td>';
                html += '<td><button class="btn-del" onclick="deleteDividend(' + item.idx + ')"><i class="ti ti-x" style="font-size:14px"></i></button></td>';
                html += '</tr>';
            });

            html += '</tbody></table></div>';
        }
        html += '</div>';
    });

    return html;
}

// ── 質押管理 ──
function addPledge() {
    var options = stockData.holdings.map(function(h) {
        return '<option value="' + esc(h.id) + '">' + esc(h.id + ' ' + h.name) + '</option>';
    }).join('');
    var ov = document.createElement('div');
    ov.className = 'overlay';
    ov.innerHTML = '<div class="modal"><h3>新增質押紀錄</h3>' +
        '<label style="font-size:12px;color:var(--muted)">質押標的</label>' +
        '<select id="pledge-stock">' + options + '</select>' +
        '<label style="font-size:12px;color:var(--muted)">質押股數</label>' +
        '<input type="number" id="pledge-shares" placeholder="0">' +
        '<label style="font-size:12px;color:var(--muted)">借款金額</label>' +
        '<input type="number" id="pledge-amount" placeholder="0">' +
        '<label style="font-size:12px;color:var(--muted)">年利率（%）</label>' +
        '<input type="number" id="pledge-rate" placeholder="例如 2.5" step="0.01">' +
        '<label style="font-size:12px;color:var(--muted)">質押日期</label>' +
        '<input type="text" id="pledge-date" placeholder="YYYY-MM-DD">' +
        '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +
        '<button class="btn-primary" id="pledge-save">確定</button></div></div>';
    document.body.appendChild(ov);
    document.getElementById('pledge-date').value = new Date().toISOString().slice(0,10);
    bindDateInput(document.getElementById('pledge-date'));
    document.getElementById('pledge-save').onclick = function() {
        var stockId = document.getElementById('pledge-stock').value;
        var shares = parseInt(document.getElementById('pledge-shares').value) || 0;
        var amount = parseInt(document.getElementById('pledge-amount').value) || 0;
        var rate = parseFloat(document.getElementById('pledge-rate').value) || 0;
        var date = document.getElementById('pledge-date').value;
        if (!stockId) { toast('請選擇標的', true); return; }
        if (shares <= 0) { toast('請輸入質押股數', true); return; }
        if (amount < 0) { toast('借款金額不可為負', true); return; }
        var holding = stockData.holdings.find(function(h){ return h.id === stockId; });
        stockData.pledges.push({
            stockId: stockId,
            stockName: holding ? holding.name : stockId,
            shares: shares,
            amount: amount,
            rate: rate,
            date: date
        });
        saveStockData();
        ov.remove();
        renderStock();
        toast('已新增質押紀錄');
    };
    // 已移除點空白關閉行為（避免誤觸）
}

function editPledge(idx) {
    var p = stockData.pledges[idx];
    if (!p) return;
    var ov = document.createElement('div');
    ov.className = 'overlay';
    ov.innerHTML = '<div class="modal"><h3>編輯質押 - ' + esc(p.stockName) + '</h3>' +
        '<label style="font-size:12px;color:var(--muted)">質押股數</label>' +

        '<label style="font-size:12px;color:var(--muted)">借款金額</label>' +
        '<input type="number" id="edit-pledge-amount" value="' + p.amount + '">' +
        '<label style="font-size:12px;color:var(--muted)">年利率（%）</label>' +
        '<input type="number" id="edit-pledge-rate" value="' + p.rate + '" step="0.01">' +
        '<label style="font-size:12px;color:var(--muted)">質押日期</label>' +
        '<input type="text" id="edit-pledge-date" placeholder="YYYY-MM-DD" value="' + (p.date||'') + '">' +
        '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +

function renewPledge(idx) {
    var p = stockData.pledges[idx];
    if (!p) return;
    var ov = document.createElement('div');
    ov.className = 'overlay';
    var today = new Date().toISOString().slice(0,10);
    ov.innerHTML = '<div class="modal"><h3><i class="ti ti-refresh"></i> 展延 - ' + esc(p.stockName) + '</h3>' +
        '<p style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5">本金與股數不變，只更新利率與起算日。<br>原利率：' + p.rate.toFixed(2) + '%、原質押日：' + esc(p.date || '-') + '</p>' +
        '<label style="font-size:12px;color:var(--muted)">新年利率（%）</label>' +
        '<input type="number" id="renew-rate" step="0.01" value="' + p.rate + '">' +
        '<label style="font-size:12px;color:var(--muted)">展延起日</label>' +
        '<input type="text" id="renew-date" placeholder="YYYY-MM-DD" value="' + today + '">' +
        '<div class="modal-btns"><button onclick="this.closest(\'.overlay\').remove()">取消</button>' +
        '<button class="btn-primary" id="renew-save">確定展延</button></div></div>';
    document.body.appendChild(ov);
    bindDateInput(document.getElementById('renew-date'));
    document.getElementById('renew-save').onclick = function() {
        var rate = parseFloat(document.getElementById('renew-rate').value);
        var date = document.getElementById('renew-date').value.trim();
        if (isNaN(rate) || rate < 0) { toast('請輸入有效利率', true); return; }
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { toast('日期格式錯誤（YYYY-MM-DD）', true); return; }
        p.rate = rate;
        p.date = date;
        saveStockData();
        ov.remove();
        renderStock();
        toast('已展延：利率 ' + rate.toFixed(2) + '%、起日 ' + date);
    };
}

function deletePledge(idx) {
    showConfirm('確定刪除此筆質押紀錄？', function() {
        stockData.pledges.splice(idx, 1);
        saveStockData();
        renderStock();
    });
}

// 綁定日期輸入框：8 碼數字自動格式化為 YYYY-MM-DD
function bindDateInput(el) {
    if (!el) return;
    el.addEventListener('input', function() {
        var v = el.value.replace(/\D/g, '');
        if (v.length >= 8) {
            el.value = v.slice(0,4) + '-' + v.slice(4,6) + '-' + v.slice(6,8);
        } else if (v.length >= 6) {
            el.value = v.slice(0,4) + '-' + v.slice(4,6) + (v.length > 6 ? '-' + v.slice(6) : '');
        } else if (v.length >= 4) {
            el.value = v.slice(0,4) + (v.length > 4 ? '-' + v.slice(4) : '');
        }
    });
}

// 計算質押到期日（預設半年 = 6 個月後）
function calcPledgeDue(dateStr) {
    var d = new Date(dateStr);
    d.setMonth(d.getMonth() + 6);
    return d;
}

function renderStockPledge() {
    var html = '';

    html += '<div class="toolbar">';
    html += '<button class="btn-refresh" style="background:var(--lux-navy)" onclick="addPledge()">＋ 新增質押</button>';
    html += '</div>';

    if (!stockData.pledges || stockData.pledges.length === 0) {
        html += '<div style="text-align:center;padding:40px;color:var(--muted)">尚未新增質押紀錄</div>';
        return html;
    }

    // 摘要
    var totalAmount = 0, totalCollateral = 0, totalDailyInterest = 0;
    stockData.pledges.forEach(function(p) {
        totalAmount += p.amount;
        var pr = stockData.prices[p.stockId];
        var curPrice = pr ? pr.price : 0;
        totalCollateral += curPrice * p.shares;
        totalDailyInterest += (p.amount || 0) * ((p.rate || 0) / 100) / 365;
    });
    var totalRatio = totalAmount > 0 ? (totalCollateral / totalAmount) * 100 : 0;
    var totalMonthlyInterest = totalDailyInterest * 30;

    html += '<div style="display:flex;flex-wrap:wrap;gap:6px 20px;font-size:14px;margin-bottom:10px;padding:8px 12px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)">';
    html += '<span style="color:var(--muted)">總借款 <b style="color:var(--red)">' + fmt(totalAmount) + '</b></span>';
    html += '<span style="color:var(--muted)">擔保現值 <b style="color:var(--lux-gold)">' + fmt(Math.round(totalCollateral)) + '</b></span>';
    html += '<span style="color:var(--muted)">維持率 <b style="color:' + (totalRatio >= 130 ? 'var(--green)' : 'var(--red)') + '">' + totalRatio.toFixed(1) + '%</b></span>';
    html += '<span style="flex:1"></span>';
    html += '<span style="color:var(--muted)">日息 <b style="color:var(--red)">' + fmt(Math.round(totalDailyInterest)) + '</b></span>';
    html += '<span style="color:var(--muted)">月息 <b style="color:var(--red)">' + fmt(Math.round(totalMonthlyInterest)) + '</b></span>';
    html += '</div>';

    // 到期提醒橫幅（半年一期 = 180 天，到期前 30 天提醒）
    var today = new Date();
    var dueAlerts = [];
    stockData.pledges.forEach(function(p) {
        if (!p.date) return;
        if (!p.amount || p.amount <= 0) return;  // 無借款不提醒到期
        var due = calcPledgeDue(p.date);
        var daysLeft = Math.ceil((due - today) / 86400000);
        if (daysLeft <= 30) {
            dueAlerts.push({ p: p, dueStr: due.toISOString().slice(0,10), daysLeft: daysLeft });
        }
    });
    if (dueAlerts.length > 0) {
        html += '<div class="dividend-alert" style="background:#FEF2F2;border-color:#FCA5A5">';
        html += '<div class="alert-title" style="color:#DC2626"><i class="ti ti-alert-triangle"></i> 質押到期提醒</div>';
        dueAlerts.forEach(function(a) {
            var label = a.daysLeft < 0 ? '（已逾期 ' + Math.abs(a.daysLeft) + ' 天）'
                      : a.daysLeft === 0 ? '（今天到期）'
                      : '（' + a.daysLeft + ' 天後到期）';
            html += '<div class="alert-item">';
            html += '<b>' + esc(a.p.stockId) + ' ' + esc(a.p.stockName) + '</b> ';
            html += '借款 ' + fmt(a.p.amount) + '，到期日 <span class="alert-date" style="color:#DC2626">' + a.dueStr + '</span> ' + label;
            html += '</div>';
        });
        html += '</div>';
    }

    // 表格
    html += '<div class="table-wrap"><table class="stock-table"><thead><tr>';
    html += '<th>標的</th><th>質押股數</th><th>借款金額</th><th>年利率</th><th>擔保現值</th><th>維持率</th><th>質押日</th><th>到期日</th><th></th>';
    html += '</tr></thead><tbody>';

    stockData.pledges.forEach(function(p, idx) {
        var pr = stockData.prices[p.stockId];
        var curPrice = pr ? pr.price : null;
        var collateral = curPrice ? curPrice * p.shares : null;
        var noDebt = (!p.amount || p.amount <= 0);
        var ratio = (collateral && p.amount > 0) ? (collateral / p.amount) * 100 : null;
        var ratioColor = noDebt ? 'var(--green)' : (ratio !== null ? (ratio >= 130 ? 'var(--green)' : 'var(--red)') : '');
        var dueStr = '-', dueColor = '', dueDaysLabel = '';
        if (p.date) {
            var due = calcPledgeDue(p.date);
            dueStr = due.toISOString().slice(0,10);
            var daysLeft = Math.ceil((due - today) / 86400000);
            if (daysLeft <= 30) {
                dueColor = 'color:#DC2626;font-weight:700';
                dueDaysLabel = '<br><span style="font-size:11px">' +
                    (daysLeft < 0 ? '逾期 ' + Math.abs(daysLeft) + ' 天' :
                     daysLeft === 0 ? '今天到期' : daysLeft + ' 天')  + '</span>';
            }
        }

        html += '<tr>';
        html += '<td class="stock-name-cell" style="cursor:pointer" onclick="editPledge(' + idx + ')">' + esc(p.stockId) + '<br><span style="font-size:12px;color:var(--muted);font-weight:400">' + esc(p.stockName) + '</span></td>';
        html += '<td>' + fmt(p.shares) + '</td>';
        html += '<td style="color:var(--red);font-weight:600">' + fmt(p.amount) + '</td>';
        html += '<td>' + p.rate.toFixed(2) + '%</td>';
        html += '<td style="font-weight:600">' + (collateral ? fmt(Math.round(collateral)) : '-') + '</td>';
        html += '<td style="font-weight:700;color:' + ratioColor + '">' + (noDebt ? '∞' : (ratio ? ratio.toFixed(1) + '%' : '-')) + '</td>';
        html += '<td style="font-size:12px">' + esc(p.date || '') + '</td>';
        html += '<td style="font-size:12px;' + (noDebt ? '' : dueColor) + '">' + (noDebt ? '-' : dueStr + dueDaysLabel) + '</td>';

        html += '</tr>';
    });

    html += '</tbody></table></div>';
    return html;
}

var ASSET_SECTIONS = [
    { key: 'liquid',     label: '流動資金', sign: +1 },
    { key: 'invest',     label: '投資',     sign: +1 },
    { key: 'fixed',      label: '固定資產', sign: +1 },
    { key: 'receivable', label: '應收款',   sign: +1 },
    { key: 'debt',       label: '負債',     sign: -1 }
];
var _assetTrendChart = null;
var _assetFxFetching = false;

function _assetUid() { return 'a_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7); }
function _todayStr() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function getFxRate(currency) {
    if (currency === 'TWD' || !currency) return 1;
    var r = DATA.assets.rates[currency];
    return (typeof r === 'number' && r > 0) ? r : 1;
}

function accountTWD(acc) {
    if (!acc) return 0;
    var amt = Number(acc.amount) || 0;
    if (acc.currency && acc.currency !== 'TWD') {
        var rate = (typeof acc.rate === 'number' && acc.rate > 0) ? acc.rate : getFxRate(acc.currency);
        return amt * rate;
    }
    return amt;
}

// 台股自動連動：持股市值總和
function calcStockHoldingsTWD() {
    if (!stockData || !Array.isArray(stockData.holdings)) return 0;
    var total = 0;
    stockData.holdings.forEach(function(h) {
        var p = stockData.prices && stockData.prices[h.id];
        var price = p ? p.price : (h.cost || 0);
        total += price * (h.shares || 0);
    });
    return total;
}
// 台股自動連動：質押借款總和
function calcStockPledgeDebtTWD() {
    if (!stockData || !Array.isArray(stockData.pledges)) return 0;
    return stockData.pledges.reduce(function(a, p){ return a + (Number(p.amount) || 0); }, 0);
}

function sectionTotal(key) {
    if (key === 'invest') {
        var manual = (DATA.assets.invest || []).reduce(function(a,x){ return a + accountTWD(x); }, 0);
        return manual + calcStockHoldingsTWD();
    }
    if (key === 'debt') {
        var manual2 = (DATA.assets.debt || []).reduce(function(a,x){ return a + accountTWD(x); }, 0);
        return manual2 + calcStockPledgeDebtTWD();
    }
    return (DATA.assets[key] || []).reduce(function(a,x){ return a + accountTWD(x); }, 0);
}

function calcNetWorth() {
    var total = 0;
    ASSET_SECTIONS.forEach(function(s) { total += s.sign * sectionTotal(s.key); });
    return Math.round(total);
}

function calcBreakdown() {
    var b = {};
    ASSET_SECTIONS.forEach(function(s) { b[s.key] = Math.round(sectionTotal(s.key)); });
    return b;
}

// ── 自動快照 ──
function maybeAutoSnapshot() {
    try {
        var today = _todayStr();
        if (!Array.isArray(DATA.assets.history)) DATA.assets.history = [];
        var hist = DATA.assets.history;
        var nw = calcNetWorth();
        var br = calcBreakdown();
        var last = hist[hist.length - 1];
        if (last && last.date === today) {
            last.netWorth = nw;
            last.breakdown = br;
        } else {
            hist.push({ date: today, netWorth: nw, breakdown: br });
            if (hist.length > 3000) hist.splice(0, hist.length - 3000);
        }
        saveData();
    } catch(e) { console.error('[maybeAutoSnapshot]', e); }
}

// ── 匯率自動抓（open.er-api.com） ──
function fetchFxRates(onDone) {
    if (_assetFxFetching) { if (onDone) onDone(false); return; }
    _assetFxFetching = true;
    var url = 'https://open.er-api.com/v6/latest/TWD';
    fetch(url).then(function(r){ return r.json(); }).then(function(data){
        _assetFxFetching = false;
        if (!data || data.result !== 'success' || !data.rates) {
            if (onDone) onDone(false);
            return;
        }
        // 回傳是 1 TWD = X foreign → 我們要 1 foreign = 1/X TWD
        var rates = DATA.assets.rates || {};
        ['USD','JPY','KRW'].forEach(function(c) {
            var v = data.rates[c];
            if (typeof v === 'number' && v > 0) rates[c] = 1 / v;
        });
        rates.updatedAt = _todayStr();
        DATA.assets.rates = rates;
        saveData();
        if (onDone) onDone(true);
    }).catch(function(err){
        _assetFxFetching = false;
        console.warn('[fetchFxRates] failed', err);
        if (onDone) onDone(false);
    });
}

function maybeAutoFetchFx() {
    var r = DATA.assets.rates || {};
    if (r.updatedAt === _todayStr()) return; // 今天已抓
    fetchFxRates(function(ok){
        if (ok && currentTab === 'assets') renderAssets();
    });
}

// ── 黃金國際金價（api.gold-api.com） ──
// 回傳 USD/oz → 換算成 TWD/兩（1 台兩 = 1.20565 oz）
function fetchGoldPrice(onDone) {
    var url = 'https://api.gold-api.com/price/XAU';
    fetch(url).then(function(r){ return r.json(); }).then(function(data){
        // 預期 { price: USD_per_oz }
        var usdPerOz = data && (data.price || data.rate || data.usd);
        if (typeof usdPerOz !== 'number' || usdPerOz <= 0) { if (onDone) onDone(false); return; }
        var usdTwd = getFxRate('USD') || 31.7;
        var twdPerTael = usdPerOz * 1.20565 * usdTwd;
        DATA.assets.goldRef = { twdPerTael: Math.round(twdPerTael), updatedAt: _todayStr() };
        saveData();
        if (onDone) onDone(true);
    }).catch(function(err){
        console.warn('[fetchGoldPrice] failed', err);
        if (onDone) onDone(false);
    });
}

function maybeAutoFetchGold() {
    var g = DATA.assets.goldRef || {};
    if (g.updatedAt === _todayStr()) return;
    fetchGoldPrice(function(ok){
        if (ok && currentTab === 'assets') renderAssets();
    });
}

// 一鍵更新匯率、金價，並把所有黃金帳戶的單價同步到最新國際金價
function manualRefreshMarket() {
    toast('更新中...');
    var fxDone = false, goldDone = false, fxOk = false, goldOk = false;
    function finish() {
        if (!fxDone || !goldDone) return;
        // 更新黃金帳戶
        var price = (DATA.assets.goldRef && DATA.assets.goldRef.twdPerTael) || 0;
        var updatedGold = 0;
        if (price) {
            ['liquid','invest','fixed','receivable','debt'].forEach(function(k){
                (DATA.assets[k] || []).forEach(function(a){
                    if (a.isGold && a.goldTael) {
                        a.goldUnitPrice = price;
                        a.amount = Math.round(a.goldTael * price);
                        a.updatedAt = _todayStr();
                        updatedGold++;
                    }
                });
            });
        }
        saveData();
        maybeAutoSnapshot();
        renderAssets();
        // 提示訊息：依成功狀況組合
        var parts = [];
        if (fxOk) parts.push('匯率已更新');
        if (goldOk) parts.push('金價 ' + fmt(price) + '/兩');
        if (updatedGold > 0) parts.push('同步 ' + updatedGold + ' 筆黃金');
        if (parts.length === 0) toast('更新失敗，請稍後再試', true);
        else toast(parts.join('·'));
    }
    fetchFxRates(function(ok){ fxDone = true; fxOk = ok; finish(); });
    fetchGoldPrice(function(ok){ goldDone = true; goldOk = ok; finish(); });
}

// ── 折線圖 ──
var _nwTrendMonths = 12; // 預設顯示近 12 個月
function renderAssetTrendChart(rangeMonths) {
    if (rangeMonths !== undefined) _nwTrendMonths = rangeMonths;
    // 更新按鈕 active 狀態
    document.querySelectorAll('.nw-range-btn').forEach(function(b){
        var text = b.textContent.trim();
        if (text === '自訂') {
            b.classList.toggle('active', _nwTrendMonths === -1);
        } else {
            var m = text.match(/\d+/);
            var val = m ? parseInt(m[0]) : 0;
            b.classList.toggle('active', val === _nwTrendMonths);
        }
    });
    var canvas = document.getElementById('nw-trend-chart');
    if (!canvas || typeof Chart === 'undefined') return;
    var hist = (DATA.assets.history || []).slice();
    // 每月最後一筆
    var byMonth = {};
    hist.forEach(function(h) {
        var m = h.date.slice(0,7);
        byMonth[m] = h; // 後蓋前 = 當月最後一筆
    });
    var months = Object.keys(byMonth).sort();
    if (_nwTrendMonths === -1 && _nwTrendCustomStart && _nwTrendCustomEnd) {
        // 自訂範圍
        months = months.filter(function(m){ return m >= _nwTrendCustomStart && m <= _nwTrendCustomEnd; });
    } else if (_nwTrendMonths > 0) {
        months = months.slice(-_nwTrendMonths);
    }
    var labels = months;
    var values = months.map(function(m){ return byMonth[m].netWorth; });

    // 統計列
    var statsEl = document.getElementById('nw-trend-stats');
    if (statsEl && values.length > 0) {
        var curNW = values[values.length - 1];
        var allMonthsSorted = Object.keys(byMonth).sort();
        var now = new Date();

        // 輔助函式：找 N 個月前的淨資產
        function _getNwMonthsAgo(n) {
            var d = new Date(now.getFullYear(), now.getMonth() - n, 1);
            var ym = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
            return byMonth[ym] ? byMonth[ym].netWorth : null;
        }
        function _fmtChange(prev) {
            if (prev === null) return '<span style="color:var(--muted)">—</span>';
            var diff = curNW - prev;
            var pct = prev !== 0 ? (diff / Math.abs(prev)) * 100 : 0;
            var isPos = diff >= 0;
            var color = isPos ? 'var(--green)' : 'var(--red)';
            var arrow = isPos ? '▲' : '▼';
            var sign = isPos ? '+' : '';
            var pctStr = prev !== 0 ? ' (' + sign + pct.toFixed(1) + '%)' : '';
            return '<span style="color:' + color + ';font-weight:700">' + arrow + ' ' + sign + fmt(diff) + pctStr + '</span>';
        }

        // 時間維度變化
        var sh = '<div class="nw-stats-row">';
        sh += '<span class="nw-stats-item">月 ' + _fmtChange(_getNwMonthsAgo(1)) + '</span>';
        sh += '<span class="nw-stats-item">季 ' + _fmtChange(_getNwMonthsAgo(3)) + '</span>';
        sh += '<span class="nw-stats-item">年 ' + _fmtChange(_getNwMonthsAgo(12)) + '</span>';
        sh += '</div>';

        // 最高 / 最低 / 平均
        var maxVal = -Infinity, minVal = Infinity, sum = 0, maxMonth = '', minMonth = '';
        for (var vi = 0; vi < values.length; vi++) {
            sum += values[vi];
            if (values[vi] > maxVal) { maxVal = values[vi]; maxMonth = labels[vi]; }
            if (values[vi] < minVal) { minVal = values[vi]; minMonth = labels[vi]; }
        }
        var avgVal = Math.round(sum / values.length);
        sh += '<div class="nw-stats-row">';
        sh += '<span class="nw-stats-item">最高 <b>' + fmt(maxVal) + '</b> <small>' + maxMonth + '</small></span>';
        sh += '<span class="nw-stats-item">最低 <b>' + fmt(minVal) + '</b> <small>' + minMonth + '</small></span>';
        sh += '<span class="nw-stats-item">平均 <b>' + fmt(avgVal) + '</b></span>';
        sh += '</div>';
        statsEl.innerHTML = sh;
    } else if (statsEl) {
        statsEl.innerHTML = '';
    }

    if (_assetTrendChart) { try { _assetTrendChart.destroy(); } catch(e){} }
    if (labels.length === 0) {
        var ctx0 = canvas.getContext('2d');
        ctx0.clearRect(0,0,canvas.width,canvas.height);
        ctx0.fillStyle = '#8C8578';
        ctx0.font = '13px sans-serif';
        ctx0.textAlign = 'center';
        ctx0.fillText('尚無歷史快照，明天回來就會有第一筆資料', canvas.width/2, 40);
        return;
    }
    _assetTrendChart = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '淨資產',
                data: values,
                borderColor: '#059669',
                backgroundColor: 'rgba(5,150,105,.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: '#059669'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: function(ctx){ return fmt(ctx.parsed.y); } } }
            },
            scales: {
                y: { ticks: { callback: function(v){ return fmt(v); } } }
            }
        }
    });
}

// ── CRUD modal ──
function _assetModal(title, acc, onOk, onDel) {
    var existing = document.getElementById('asset-modal-overlay');
    if (existing) existing.remove();
    var overlay = document.createElement('div');
    overlay.id = 'asset-modal-overlay';
    overlay.className = 'asset-modal-overlay';
    var html = '';
    var goldRef = (DATA.assets.goldRef && DATA.assets.goldRef.twdPerTael) || 0;
    html += '<div class="asset-modal" onclick="event.stopPropagation()">';
    html += '<h3>' + esc(title) + '</h3>';
    html += '<div class="fld"><label>名稱</label><input id="am-name" type="text" value="' + esc(acc.name || '') + '"></div>';
    html += '<div class="fld"><label><input id="am-gold" type="checkbox"' + (acc.isGold ? ' checked' : '') + '> 這是黃金（按台兩記錄）</label></div>';
    // 一般欄位（非黃金）
    html += '<div id="am-normal-fields">';
    html += '<div class="row2">';
    html += '<div class="fld"><label>幣別</label><select id="am-cur"><option value="TWD">TWD</option><option value="USD">USD</option><option value="JPY">JPY</option><option value="KRW">KRW</option></select></div>';
    html += '<div class="fld"><label>金額</label><input id="am-amt" type="number" step="any" value="' + (!acc.isGold && acc.amount != null ? acc.amount : '') + '"></div>';
    html += '</div>';
    html += '<div class="fld" id="am-rate-row" style="display:none"><label>匯率（1 外幣 = ? TWD）</label><input id="am-rate" type="number" step="any" value="' + (acc.rate != null ? acc.rate : '') + '"></div>';
    html += '</div>';
    // 黃金欄位
    html += '<div id="am-gold-fields" style="display:none">';
    html += '<div class="row2">';
    html += '<div class="fld"><label>持有（台兩）</label><input id="am-gold-tael" type="number" step="any" value="' + (acc.goldTael != null ? acc.goldTael : '') + '"></div>';
    html += '<div class="fld"><label>單價（TWD/兩）</label><input id="am-gold-price" type="number" step="any" value="' + (acc.goldUnitPrice != null ? acc.goldUnitPrice : (goldRef || '')) + '"></div>';
    html += '</div>';
    html += '<div class="fld"><label>換算總價</label><input id="am-gold-total" type="text" value="" readonly style="background:#FAFAF9;color:var(--lux-navy);font-weight:800"></div>';
    if (goldRef) html += '<div style="font-size:11px;color:var(--muted);margin-top:-6px;margin-bottom:12px">參考國際金價：' + fmt(goldRef) + ' /兩</div>';
    html += '</div>';
    html += '<div class="fld"><label>備註（選填）</label><input id="am-memo" type="text" value="' + esc(acc.memo || '') + '"></div>';
    html += '<div class="btns">';
    if (onDel) html += '<button class="btn-del" id="am-del">刪除</button>';
    html += '<button class="btn-cancel" id="am-cancel">取消</button>';
    html += '<button class="btn-ok" id="am-ok">儲存</button>';
    html += '</div>';
    html += '</div>';
    overlay.innerHTML = html;
    overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
    var curSel = document.getElementById('am-cur');
    curSel.value = acc.currency || 'TWD';
    var rateRow = document.getElementById('am-rate-row');
    var goldCheck = document.getElementById('am-gold');
    var normalFields = document.getElementById('am-normal-fields');
    var goldFields = document.getElementById('am-gold-fields');
    var goldTaelIn = document.getElementById('am-gold-tael');
    var goldPriceIn = document.getElementById('am-gold-price');
    var goldTotalIn = document.getElementById('am-gold-total');
    function updateRateRow() {
        if (curSel.value === 'TWD') rateRow.style.display = 'none';
        else {
            rateRow.style.display = '';
            var rIn = document.getElementById('am-rate');
            if (!rIn.value) rIn.value = getFxRate(curSel.value);
        }
    }
    function updateGoldTotal() {
        var t = Number(goldTaelIn.value) || 0;
        var p = Number(goldPriceIn.value) || 0;
        goldTotalIn.value = Math.round(t * p).toLocaleString();
    }
    function updateGoldMode() {
        if (goldCheck.checked) {
            normalFields.style.display = 'none';
            goldFields.style.display = '';
            updateGoldTotal();
        } else {
            normalFields.style.display = '';
            goldFields.style.display = 'none';
        }
    }
    curSel.addEventListener('change', updateRateRow);
    goldCheck.addEventListener('change', updateGoldMode);
    goldTaelIn.addEventListener('input', updateGoldTotal);
    goldPriceIn.addEventListener('input', updateGoldTotal);
    updateRateRow();
    updateGoldMode();
    document.getElementById('am-cancel').onclick = function(){ overlay.remove(); };
    document.getElementById('am-ok').onclick = function(){
        var name = document.getElementById('am-name').value.trim();
        var memo = document.getElementById('am-memo').value.trim();
        var isGold = goldCheck.checked;
        if (!name) { toast('請輸入名稱', true); return; }
        var result;
        if (isGold) {
            var tael = Number(goldTaelIn.value);
            var unitPrice = Number(goldPriceIn.value);
            if (isNaN(tael) || tael <= 0) { toast('請輸入台兩數', true); return; }
            if (isNaN(unitPrice) || unitPrice <= 0) { toast('請輸入單價', true); return; }
            result = {
                id: acc.id || _assetUid(),
                name: name,
                amount: Math.round(tael * unitPrice),
                currency: 'TWD',
                rate: 1,
                memo: memo,
                isGold: true,
                goldTael: tael,
                goldUnitPrice: unitPrice,
                updatedAt: _todayStr()
            };
        } else {
            var amt = Number(document.getElementById('am-amt').value);
            var cur = curSel.value;
            var rate = Number(document.getElementById('am-rate').value);
            if (isNaN(amt)) { toast('請輸入數字金額', true); return; }
            result = {
                id: acc.id || _assetUid(),
                name: name,
                amount: amt,
                currency: cur,
                rate: cur === 'TWD' ? 1 : (rate > 0 ? rate : getFxRate(cur)),
                memo: memo,
                isGold: false,
                updatedAt: _todayStr()
            };
        }
        onOk(result);
        overlay.remove();
    };
    if (onDel) {
        document.getElementById('am-del').onclick = function(){
            var curName = document.getElementById('am-name').value.trim() || acc.name || '此項目';
            confirmAction('確定刪除「' + esc(curName) + '」？', function(){
                onDel();
                overlay.remove();
            }, { danger: true });
        };
    }
    setTimeout(function(){ document.getElementById('am-name').focus(); }, 50);
}

function addAssetAccount(sectionKey) {
    var sec = ASSET_SECTIONS.find(function(s){ return s.key === sectionKey; });
    _assetModal('新增' + sec.label + '項目', { currency: 'TWD' }, function(acc){
        DATA.assets[sectionKey].push(acc);
        saveData();
        maybeAutoSnapshot();
        renderAssets();
    });
}

function moveAssetAccount(sectionKey, id, delta) {
    var list = DATA.assets[sectionKey] || [];
    var idx = -1;
    for (var i=0;i<list.length;i++) if (list[i].id === id) { idx = i; break; }
    if (idx < 0) return;
    var newIdx = idx + delta;
    if (newIdx < 0 || newIdx >= list.length) return;
    var tmp = list[idx];
    list[idx] = list[newIdx];
    list[newIdx] = tmp;
    saveData();
    renderAssets();
}

function editAssetAccount(sectionKey, id) {
    var list = DATA.assets[sectionKey] || [];
    var idx = -1;
    for (var i=0;i<list.length;i++) if (list[i].id === id) { idx = i; break; }
    if (idx < 0) return;
    var sec = ASSET_SECTIONS.find(function(s){ return s.key === sectionKey; });
    var cur = list[idx];
    var name = cur.name;
    _assetModal('編輯' + sec.label + '項目', cur, function(acc){
        DATA.assets[sectionKey][idx] = acc;
        saveData();
        maybeAutoSnapshot();
        renderAssets();
    }, function(){
        DATA.assets[sectionKey].splice(idx, 1);
        saveData();
        maybeAutoSnapshot();
        renderAssets();
        toast('已刪除「' + name + '」');
    });
}

// ── 初始化 ──
loadData();
loadStockData();
updateLastExportLabel();
// 一次性：放款→借款
(function(){
    var changed = false;
    DATA.settings.passiveSources.forEach(function(s,i){
        var n = typeof s === 'string' ? s : s.name;
        if (n === '放款') {
            if (typeof s === 'string') DATA.settings.passiveSources[i] = '借款';
            else s.name = '借款';
            changed = true;
        }
    });
    if (changed) {
        DATA.settings.years.forEach(function(y){
            if (DATA.passive[y] && DATA.passive[y]['放款']) {
                DATA.passive[y]['借款'] = DATA.passive[y]['放款'];
                delete DATA.passive[y]['放款'];
            }
        });
        saveData();
    }
})();
render();
// 啟動時：自動快照 + 背景抓匯率/金價（不擋畫面）
try { maybeAutoSnapshot(); } catch(e) { console.error('[maybeAutoSnapshot init]', e); }
setTimeout(function(){
    try { maybeAutoFetchFx(); } catch(e) { console.error('[maybeAutoFetchFx init]', e); }
    try { maybeAutoFetchGold(); } catch(e) { console.error('[maybeAutoFetchGold init]', e); }
}, 500);
// 定期收入循環：畫面先出來，再跳補記 modal（等 DOM 準備好）
_whenReady(function(){
    try { runRecurringAutoPost(); } catch(e) { console.error('[runRecurringAutoPost]', e); }
});
</script>
